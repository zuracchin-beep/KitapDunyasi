<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitap Dünyası | Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="books.html">Cart</a>
        <a href="media.html">Media Room</a>
        <a href="login.html">Sign In / Sign Up</a>
    </nav>

    <div class="container" style="text-align: center;">
        <h2>Customer Authentication Portal</h2>
        <p>Access your personal account or create a new membership to manage your orders.</p>

        <div style="display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; margin-top: 30px;">
            
            <!-- Sign In Box -->
            <div class="auth-box">
                <h3 style="border: none; margin-bottom: 20px;">Sign In</h3>
                <form onsubmit="event.preventDefault(); alert('Successfully signed in!');">
                    <div class="form-group">
                        <label>Student Email / Username</label>
                        <input type="text" placeholder="Enter your email or username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter your password" required>
                    </div>
                    <button class="btn-add" type="submit" style="margin-top: 15px;">Login</button>
                </form>
            </div>

            <!-- Sign Up Box -->
            <div class="auth-box">
                <h3 style="border: none; margin-bottom: 20px;">Sign Up (Register)</h3>
                <form onsubmit="event.preventDefault(); alert('Account successfully created!');">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="example@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label>Create Password</label>
                        <input type="password" placeholder="Minimum 6 characters" required>
                    </div>
                    <button class="btn-add" type="submit" style="margin-top: 15px; background-color: #344a3a;">Register</button>
                </form>
            </div>

        </div>
    </div>

    <footer>
        <p>Project Members: İpek Demircioğlu & Yaren Tay | Web Design Term Project</p>
    </footer>

</body>
</html>
