<!DOCTYPE html>
<html lang="tr">

    <meta charset="UTF-8">
    <title>İletişim & Sipariş</title>

<body>

    <nav>
        <a href="index.html">Anasayfa</a>
        <a href="books.html">Kitaplarımız</a>
        <a href="media.html">Medya</a>
        <a href="contact.html">İletişim</a>

    <div class="container">
        <h2>Bizimle İletişime Geçin / Sipariş Verin</h2>
        <p>Sorularınız veya toplu kitap sipariş talepleriniz için aşağıdaki formu doldurabilirsiniz.</p>

        <form action="https://formspree.io/f/your_formspree_code" method="POST" style="display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 30px auto;">
            
            <label for="name">Adınız Soyadınız:</label>
            <input type="text" id="name" name="name" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">

            <label for="email">E-posta Adresiniz:</label>
            <input type="email" id="email" name="email" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">

            <label for="subject">Mesaj Konusu:</label>
            <select id="subject" name="subject" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <option value="siparis">Kitap Siparişi</option>
                <option value="destek">Destek / Soru</option>
                <option value="oneri">Kitap Önerisi</option>
            </select>

            <label for="message">Mesajınız:</label>
            <textarea id="message" name="message" rows="5" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;"></textarea>

            <button type="submit" style="padding: 12px; background-color: #5c3d2e; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                Mesajı / Siparişi Gönder
            </button>
        </form>
    </div>

    <footer>
        <p>Grup Üyeleri: İpek Demircioğlu & Yaren Tay | Web Tasarım Dönem Projesi</p>
    </footer>

</body>
</html>
