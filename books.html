<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kitap Dünyası | Sepetim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html">Anasayfa</a>
        <a href="books.html">Sepetim</a>
        <a href="media.html">Medya Odası</a>
        <a href="contact.html">İletişim</a>
    </nav>

    <div class="container">
        <h2>Alışveriş Sepetim</h2>
        <p>Kitap Dünyası'ndan seçtiğiniz harika felsefe ve edebiyat eserleri:</p>

        <table style="width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left;">
            <thead>
                <tr style="background-color: #4a6b53; color: white;">
                    <th style="padding: 12px;">Görsel</th>
                    <th style="padding: 12px;">Kitap Adı</th>
                    <th style="padding: 12px;">Adet</th>
                    <th style="padding: 12px;">Birim Fiyat</th>
                    <th style="padding: 12px;">Toplam</th>
                    <th style="padding: 12px;">İşlem</th>
                </tr>
            </thead>
            <tbody id="sepetTabloGövde">
                </tbody>
        </table>

        <div style="margin-top: 30px; text-align: right; padding: 20px; background-color: #e8efe9; border-radius: 8px;">
            <h3 style="border: none; margin: 0; padding: 0; color: #344a3a;">
                Genel Toplam: <span id="sepetToplamTutar">0.00</span> TL
            </h3>
            <button onclick="sepetiTemizle()" style="background-color: #bd1522; color: white; border: none; padding: 10px 15px; border-radius: 6px; margin-top: 15px; font-weight: bold; cursor: pointer;">Sepeti Temizle</button>
        </div>
    </div>

    <footer>
        <p>Grup Üyeleri: İpek Demircioğlu & Yaren Tay | Web Tasarım Dönem Projesi</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            sepetiListele();
        });

        function sepetiListele() {
            let sepet = JSON.parse(localStorage.getItem('sepet')) || [];
            let tabloGövde = document.getElementById('sepetTabloGövde');
            let toplamAlan = document.getElementById('sepetToplamTutar');
            
            tabloGövde.innerHTML = "";
            let genelToplam = 0;

            if (sepet.length === 0) {
                tabloGövde.innerHTML = `<tr><td colspan="6" style="padding: 20px; text-align: center; color: #777;">Sepetiniz şu anda boş. Anasayfadan kitap ekleyebilirsiniz!</td></tr>`;
                toplamAlan.innerText = "0.00";
                return;
            }

            sepet.forEach((item, index) => {
                let satirToplam = item.fiyat * item.adet;
                genelToplam += satirToplam;

                tabloGövde.innerHTML += `
                    <tr style="border-bottom: 1px solid #e8efe9;">
                        <td style="padding: 12px;"><img src="${item.resim}" style="width: 50px; height: 75px; object-fit: cover; border-radius: 4px;"></td>
                        <td style="padding: 12px; font-weight: bold; color: #2d3a31;">${item.ad}</td>
                        <td style="padding: 12px; font-weight: bold;">${item.adet} Adet</td>
                        <td style="padding: 12px;">${item.fiyat.toFixed(2)} TL</td>
                        <td style="padding: 12px; color: #4a6b53; font-weight: bold;">${satirToplam.toFixed(2)} TL</td>
                        <td style="padding: 12px;"><button onclick="urunSil(${index})" style="background: none; border: none; color: #bd1522; font-weight: bold; cursor: pointer;">Kaldır</button></td>
                    </tr>
                `;
            });

            toplamAlan.innerText = genelToplam.toFixed(2);
        }

        function urunSil(index) {
            let sepet = JSON.parse(localStorage.getItem('sepet')) || [];
            sepet.splice(index, 1);
            localStorage.setItem('sepet', JSON.stringify(sepet));
            sepetiListele();
        }

        function sepetiTemizle() {
            localStorage.removeItem('sepet');
            sepetiListele();
        }
    </script>

</body>
</html>
